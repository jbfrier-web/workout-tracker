<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Workout Tracker">
<title>Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f5f3;--s1:#eeeeec;--s2:#e6e6e4;--s3:#dcdcda;
  --border:#d4d4d2;--border2:#c0c0be;--text:#1a1a18;--muted:#6b6b68;--faint:#c0c0be;
  --white:#ffffff;
  --green:#2c5f3d;--green-mid:#3d7a52;--green-light:#e8f2eb;--green-border:#b8d4c0;
  --amber:#8a5a00;--amber-bg:#fdf3e0;--amber-border:#e8d0a0;
  --red:#8a2020;--red-bg:#fdf0f0;--red-border:#e8c0c0;
  --blue:#1a4a7a;--blue-bg:#e8f0fd;--blue-border:#b8ccf0;
  --purple:#4a1a7a;--purple-bg:#f0e8fd;--purple-border:#ccb8f0;
  --safe:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg)}

#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:1000;padding:48px 32px}
.lock-logo{font-size:28px;font-weight:800;color:var(--green);letter-spacing:-.5px;margin-bottom:48px}
#lock input{width:100%;max-width:260px;padding:15px 20px;background:var(--white);border:1.5px solid var(--border2);border-radius:14px;color:var(--text);font-size:20px;text-align:center;letter-spacing:6px;outline:none;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
#lock input:focus{border-color:var(--green)}
#lock .unlock-btn{width:100%;max-width:260px;padding:15px;background:var(--green);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 2px 12px rgba(44,95,61,.25)}
.lock-err{font-size:12px;color:var(--red);margin-top:10px;font-weight:600}

#setup{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:999;padding:60px 28px 40px;overflow-y:auto}
#setup h2{font-size:26px;font-weight:800;margin-bottom:10px}
#setup p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px}
#setup input{width:100%;padding:14px 16px;background:var(--white);border:1.5px solid var(--border2);border-radius:12px;color:var(--text);font-size:13px;outline:none;margin-bottom:12px}
#setup input:focus{border-color:var(--green)}
#setup .setup-btn{width:100%;padding:15px;background:var(--green);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}

#app{display:none;flex-direction:column;height:100%}
#nav{background:var(--white);border-bottom:1.5px solid var(--border);padding:12px 20px 0;padding-top:calc(12px + env(safe-area-inset-top,0px));flex-shrink:0;box-shadow:0 1px 8px rgba(0,0,0,.06)}
#nav-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
#nav-title{font-size:20px;font-weight:800;color:var(--green);letter-spacing:-.5px}
#api-btn{font-size:11px;font-weight:600;color:var(--muted);background:var(--s1);border:1.5px solid var(--border);padding:4px 12px;border-radius:20px;cursor:pointer}
#api-btn.ok{color:var(--green);border-color:var(--green-border);background:var(--green-light)}
#nav-tabs{display:flex}
.tab-btn{flex:1;padding:10px 4px 13px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;text-align:center;transition:all .15s}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
#content{flex:1;overflow:hidden;position:relative}
.tab-panel{display:none;height:100%;overflow-y:auto;padding:0 0 60px;-webkit-overflow-scrolling:touch}
.tab-panel.active{display:block}
#chat-panel{display:none;height:100%;flex-direction:column}
#chat-panel.active{display:flex}
.padded{padding:20px 18px}

.slabel{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;border:1.5px solid var(--border);color:var(--muted);background:var(--white)}
.pill.ok{color:var(--green);border-color:var(--green-border);background:var(--green-light)}
.btn-green{background:var(--green);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 3px 14px rgba(44,95,61,.28);transition:all .15s;padding:16px;width:100%}
.btn-green:active{transform:scale(.98)}

#date-section{background:var(--white);border-bottom:1.5px solid var(--border);padding:14px 16px;flex-shrink:0}
.date-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-tile{border-radius:10px;padding:7px 3px 8px;text-align:center;cursor:pointer;transition:all .12s;border:1.5px solid transparent;position:relative;background:var(--s1)}
.day-tile .dt-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.day-tile .dt-date{font-size:14px;font-weight:700;margin-bottom:3px}
.day-tile .dt-icon{font-size:13px;line-height:1;height:14px}
.day-tile.today{background:var(--white);border-color:var(--border2)}
.day-tile.has-session{background:var(--green-light);border-color:var(--green-border)}
.day-tile.has-session .dt-label{color:var(--green)}
.day-tile.selected{border-color:var(--green);box-shadow:0 0 0 2px rgba(44,95,61,.15)}

.pain-warn-banner{background:var(--red-bg);border:1.5px solid var(--red-border);border-radius:12px;padding:12px 16px;margin:16px 18px 0;font-size:13px;color:var(--red);font-weight:600}
.deload-banner{background:var(--purple-bg);border:1.5px solid var(--purple-border);border-radius:12px;padding:12px 16px;margin:16px 18px 0;display:flex;gap:10px;align-items:center}
.deload-banner .db-icon{font-size:20px}
.deload-banner .db-text{font-size:13px;font-weight:700;color:var(--purple)}
.deload-banner .db-sub{font-size:11px;color:var(--purple);opacity:.85;margin-top:2px;font-weight:500}
.stall-banner{background:var(--amber-bg);border:1.5px solid var(--amber-border);border-radius:12px;padding:12px 16px;margin:16px 18px 0;font-size:13px;color:var(--amber);font-weight:600}

.workout-picker{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.workout-tile{background:var(--white);border:2px solid var(--border);border-radius:16px;padding:14px 18px;cursor:pointer;transition:all .15s;box-shadow:0 1px 6px rgba(0,0,0,.05);display:flex;align-items:center;gap:14px;position:relative}
.workout-tile.selected{border-color:var(--green);background:var(--green-light)}
.workout-tile.done-today{border-color:var(--green-border);background:var(--green-light)}
.workout-tile.recommended:not(.selected):not(.done-today){border-color:var(--blue-border);background:var(--blue-bg)}
.wt-emoji{font-size:24px;flex-shrink:0;width:34px;text-align:center}
.wt-info{flex:1}
.wt-name{font-size:16px;font-weight:700;margin-bottom:1px;display:flex;align-items:center;gap:8px}
.wt-desc{font-size:12px;color:var(--muted);font-weight:500}
.wt-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:800}
.workout-tile.selected .wt-check,.workout-tile.done-today .wt-check{background:var(--green);border-color:var(--green)}
.done-badge{font-size:10px;font-weight:700;color:var(--green);background:var(--white);border:1px solid var(--green-border);padding:2px 8px;border-radius:10px;flex-shrink:0;margin-right:6px}
.recommended-badge{font-size:9px;font-weight:700;color:var(--blue);background:var(--white);border:1px solid var(--blue-border);padding:2px 7px;border-radius:8px;letter-spacing:.5px;text-transform:uppercase}

.pain-row{display:flex;gap:7px;margin-bottom:6px}
.pain-btn{flex:1;padding:11px 2px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);font-size:15px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .1s}
.pain-btn.ag{border-color:var(--border2);background:var(--s2);color:var(--text)}
.pain-btn.a1{border-color:var(--green-border);background:var(--green-light);color:var(--green)}
.pain-btn.a2{border-color:var(--amber-border);background:var(--amber-bg);color:var(--amber)}
.pain-btn.a3{border-color:var(--red-border);background:var(--red-bg);color:var(--red)}
.pain-label{font-size:12px;font-weight:600;margin-bottom:22px;min-height:18px}

.mob-list{display:flex;flex-direction:column;gap:4px;margin-bottom:26px}
.mob-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .12s}
.mob-item.done{background:var(--green-light);border-color:var(--green-border)}
.mob-check{width:20px;height:20px;border-radius:6px;flex-shrink:0;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;transition:all .12s}
.mob-item.done .mob-check{background:var(--green);border-color:var(--green)}
.mob-name{font-size:14px;font-weight:600;flex:1}
.mob-rx{font-size:11px;color:var(--muted);font-weight:500;flex-shrink:0}
.mob-item.done .mob-name{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--faint)}

.ex-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:15px 16px 14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.ex-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.ex-name{font-size:15px;font-weight:700}
.ex-note{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;font-weight:500}
.ex-meta{text-align:right;flex-shrink:0;margin-left:10px}
.ex-rx{font-size:11px;font-weight:700;color:var(--muted);background:var(--s1);border:1px solid var(--border);padding:3px 9px;border-radius:6px;display:inline-block}
.ex-rx.deload{color:var(--purple);background:var(--purple-bg);border-color:var(--purple-border)}
.ex-last{font-size:11px;color:var(--green-mid);margin-top:4px;font-weight:600}
.suggest-tip{border-radius:10px;padding:9px 13px;font-size:12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:600}
.suggest-tip.green{background:var(--green-light);border:1.5px solid var(--green-border);color:var(--green)}
.suggest-tip.amber{background:var(--amber-bg);border:1.5px solid var(--amber-border);color:var(--amber)}
.suggest-tip.blue{background:var(--blue-bg);border:1.5px solid var(--blue-border);color:var(--blue)}
.suggest-tip.red{background:var(--red-bg);border:1.5px solid var(--red-border);color:var(--red)}
.suggest-tip.purple{background:var(--purple-bg);border:1.5px solid var(--purple-border);color:var(--purple)}
.sets-hdr{display:grid;grid-template-columns:28px 1fr 1fr;gap:8px;margin-bottom:7px}
.sets-col{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;text-align:center}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr;gap:8px;margin-bottom:7px;align-items:center}
.set-num{font-size:11px;color:var(--muted);text-align:center;font-weight:700}
.set-num.hit{color:var(--green)}
.set-input{background:var(--s1);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:11px 0;font-size:17px;font-family:'DM Sans',sans-serif;font-weight:700;text-align:center;width:100%;outline:none;-webkit-appearance:none;transition:all .12s}
.set-input:focus{border-color:var(--green);background:var(--white)}
.set-input.hit{background:var(--green-light);border-color:var(--green-border);color:var(--green)}
.set-input.suggested{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.band-sets{display:flex;gap:8px}
.band-btn{flex:1;padding:12px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--s1);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.band-btn.done{background:var(--green-light);border-color:var(--green-border);color:var(--green)}

.notes-area{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:14px;color:var(--text);padding:13px 15px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;line-height:1.6;outline:none;resize:none;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.notes-area:focus{border-color:var(--green)}

.sess-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.sess-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;cursor:pointer}
.sess-date{font-size:15px;font-weight:700;margin-bottom:2px}
.sess-meta{font-size:11px;color:var(--muted);font-weight:600}
.sess-pain{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--s1)}
.sess-deload-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--purple-bg);border:1px solid var(--purple-border);color:var(--purple);margin-right:6px}
.sess-body{border-top:1.5px solid var(--border);padding:14px 16px;display:none}
.sess-body.open{display:block}
.sess-ex{background:var(--s1);border-radius:10px;padding:10px 13px;margin-bottom:7px}
.sess-ex-name{font-size:12px;font-weight:700;margin-bottom:7px}
.sess-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;background:var(--white);border:1.5px solid var(--border);color:var(--muted)}
.chip.hit{background:var(--green-light);border-color:var(--green-border);color:var(--green)}
.empty-state{text-align:center;padding:60px 20px}
.empty-state .icon{font-size:40px;margin-bottom:16px}
.empty-state h3{font-size:20px;font-weight:800;margin-bottom:8px}
.empty-state p{font-size:13px;color:var(--muted);line-height:1.7;font-weight:500}

.mem-card{background:var(--green-light);border:1.5px solid var(--green-border);border-radius:14px;padding:16px;margin-bottom:20px}
.mem-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:8px}
.mem-text{font-size:13px;color:var(--text);line-height:1.7;font-weight:500}
.prog-wkt{background:var(--white);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.prog-wkt-hdr{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer}
.prog-wkt-emoji{font-size:22px}
.prog-wkt-name{font-size:17px;font-weight:700;flex:1}
.prog-wkt-toggle{font-size:11px;color:var(--muted);font-weight:700}
.prog-wkt-body{border-top:1.5px solid var(--border);padding:14px 18px;display:none}
.prog-wkt-body.open{display:block}
.prog-section-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:8px 0 4px}
.prog-ex-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.prog-ex-row:last-child{border-bottom:none}
.prog-ex-name{font-size:14px;font-weight:600}
.prog-ex-note{font-size:11px;color:var(--muted);margin-top:1px}
.prog-ex-rx{font-size:12px;font-weight:700;color:var(--green)}
.prog-hint{background:var(--s1);border:1.5px dashed var(--border2);border-radius:14px;padding:16px;text-align:center;color:var(--muted);font-size:13px;font-weight:600;line-height:1.6;margin-top:4px}

#chat-messages{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:12px}
.msg{max-width:88%}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.msg-bubble{padding:12px 15px;border-radius:18px;font-size:14px;line-height:1.6;font-weight:500}
.msg.user .msg-bubble{background:var(--green);color:#fff;border-bottom-right-radius:5px;box-shadow:0 2px 8px rgba(44,95,61,.2)}
.msg.assistant .msg-bubble{background:var(--white);border:1.5px solid var(--border);color:var(--text);border-bottom-left-radius:5px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.msg.assistant .msg-bubble strong{color:var(--green)}
.msg-time{font-size:9px;color:var(--faint);margin-top:4px;padding:0 4px;font-weight:600}
.msg.user .msg-time{text-align:right}
.typing-ind{display:flex;gap:5px;padding:14px 15px;background:var(--white);border:1.5px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;align-self:flex-start;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--faint);animation:bounce 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#chat-input-area{background:var(--white);border-top:1.5px solid var(--border);padding:12px 16px;display:flex;gap:10px;align-items:flex-end;padding-bottom:calc(14px + var(--safe));box-shadow:0 -1px 8px rgba(0,0,0,.05)}
#chat-input{flex:1;background:var(--s1);border:1.5px solid var(--border);border-radius:22px;color:var(--text);padding:11px 16px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;outline:none;resize:none;max-height:120px;line-height:1.5;-webkit-appearance:none}
#chat-input:focus{border-color:var(--green);background:var(--white)}
#chat-send{width:42px;height:42px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;box-shadow:0 2px 8px rgba(44,95,61,.25)}
#chat-send:active{transform:scale(.92)}
#chat-send:disabled{opacity:.4;cursor:default;box-shadow:none}

.toast{position:fixed;bottom:calc(80px + var(--safe));left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:14px;font-weight:700;padding:12px 22px;border-radius:30px;box-shadow:0 6px 20px rgba(44,95,61,.4);z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.error{background:var(--red);box-shadow:0 6px 20px rgba(138,32,32,.4)}

.modal-overlay{position:fixed;inset:0;background:rgba(26,26,24,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--white);border:1.5px solid var(--border);border-radius:22px;padding:26px;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal h3{font-size:20px;font-weight:800;margin-bottom:8px}
.modal p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:18px;font-weight:500}
.modal input{width:100%;background:var(--s1);border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:13px 15px;font-size:13px;font-family:'DM Sans',monospace;outline:none;margin-bottom:14px}
.modal input:focus{border-color:var(--green)}
.modal-btns{display:flex;gap:10px}
.btn-p{flex:1;padding:14px;border-radius:12px;background:var(--green);border:none;color:#fff;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-s{padding:14px 20px;border-radius:12px;background:transparent;border:1.5px solid var(--border);color:var(--muted);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600}

input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
::placeholder{color:var(--faint)}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<div id="lock">
  <div class="lock-logo">Workout Tracker</div>
  <input type="password" id="lock-input" placeholder="••••••••" maxlength="20">
  <button class="unlock-btn" onclick="unlock()">Unlock</button>
  <div class="lock-err" id="lock-err"></div>
</div>

<div id="setup">
  <h2>One-time setup</h2>

// ── DUMBBELL WEIGHTS ──
function getAvailableWeights(){
  const h=5,w=new Set([h]);
  for(let a=0;a<=4;a++)for(let b=0;b<=4;b++)for(let c=0;c<=4;c++){
    const wt=h+2*(a*3+b*5+c*7.5);
    if(wt<=120)w.add(Math.round(wt*10)/10);
  }
  return [...w].sort((a,b)=>a-b);
}
const WEIGHTS=getAvailableWeights();
function nextWeight(cur){const i=WEIGHTS.findIndex(w=>Math.abs(w-cur)<0.1);return i>=0&&i<WEIGHTS.length-1?WEIGHTS[i+1]:null;}
function nearestWeight(t){return WEIGHTS.reduce((b,w)=>Math.abs(w-t)<Math.abs(b-t)?w:b,WEIGHTS[0]);}

// ── SCHEDULE LOGIC ──
function getDayOfWeek(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  return d.getDay()===0?6:d.getDay()-1; // 0=Mon..6=Sun
}

function getWeekDates(){
  const d=new Date(),day=d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x.toISOString().split('T')[0]});
}

function getSuggestedWorkout(){
  const scheduledToday=SCHEDULE_PATTERN[getDayOfWeek(TODAY)];
  if(scheduledToday==='rest')return 'mobility'; // suggest mobility on rest day
  
  const weekDates=getWeekDates();
  const weekSessions=getSessions().filter(s=>weekDates.includes(s.date));
  const liftingDoneThisWeek=new Set(weekSessions.filter(s=>['upper','lower','full'].includes(s.workoutId)).map(s=>s.workoutId));
  
  // If today's scheduled is lifting and not done, recommend it
  if(['upper','lower','full'].includes(scheduledToday)&&!liftingDoneThisWeek.has(scheduledToday))return scheduledToday;
  
  // If today's scheduled is mobility, check if any lifting workouts missing this week
  if(scheduledToday==='mobility'){
    for(const wid of ['upper','lower','full']){
      if(!liftingDoneThisWeek.has(wid))return wid;
    }
    return 'mobility';
  }
  
  // Already did today's scheduled - find any lifting missing
  for(const wid of ['upper','lower','full']){
    if(!liftingDoneThisWeek.has(wid))return wid;
  }
  return 'mobility';
}

// ── DELOAD LOGIC ──
function getSessionsSinceLastDeload(workoutId){
  const sessions=getSessions().filter(s=>s.workoutId===workoutId);
  for(let i=0;i<sessions.length;i++){
    if(sessions[i].deload)return i;
  }
  return sessions.length;
}

function shouldDeloadNow(workoutId){
  if(!['upper','lower','full'].includes(workoutId))return false;
  return getSessionsSinceLastDeload(workoutId)>=DELOAD_THRESHOLD;
}

function isStalled(workoutId){
  if(!['upper','lower','full'].includes(workoutId))return false;
  const w=program.workouts.find(w=>w.id===workoutId);
  if(!w)return false;
  let stalled=0;
  w.sections.forEach(sec=>{
    if(sec.type!=='exercises')return;
    sec.items.forEach(ex=>{
      if(ex.banded)return;
      const sessions=getSessions().filter(s=>s.workoutId===workoutId&&!s.deload).slice(0,3);
      if(sessions.length<3)return;
      const weights=sessions.map(s=>{
        const sets=s.sections?.[sec.id]?.[ex.id]||[];
        const ws=sets.map(r=>parseFloat(r.w)).filter(n=>!isNaN(n)&&n>0);
        return ws.length?Math.max(...ws):0;
      });
      if(weights[0]>0&&weights.every(w=>w===weights[0]))stalled++;
    });
  });
  return stalled>=STALL_THRESHOLD;
}

function getDeloadSets(originalSets){
  return Math.max(2,Math.floor(originalSets*0.66));
}

// ── DATE STRIP ──
function getSessionsForDate(date){return getSessions().filter(s=>s.date===date);}
function renderDateStrip(){
  const dates=getWeekDates();
  const strip=document.getElementById('date-strip');
  strip.innerHTML='';
  dates.forEach((date,i)=>{
    const sessionsToday=getSessionsForDate(date);
    const hasSession=sessionsToday.length>0;
    const isToday=date===TODAY;
    const isSelected=date===selectedDate;
    let cls='day-tile';
    if(hasSession)cls+=' has-session';
    if(isToday)cls+=' today';
    if(isSelected)cls+=' selected';
    const emojis=sessionsToday.map(s=>program.workouts.find(w=>w.id===s.workoutId)?.emoji||'').join('');
    const tile=document.createElement('div');
    tile.className=cls;
    tile.innerHTML=`<div class="dt-label">${DAY_SHORT[i]}</div><div class="dt-date">${new Date(date+'T12:00:00').getDate()}</div><div class="dt-icon">${emojis||'·'}</div>`;
    tile.onclick=()=>selectDate(date);
    strip.appendChild(tile);
  });
}
function selectDate(date){
  if(date>TODAY)return;
  selectedDate=date;
  selectedWorkout=date===TODAY?getSuggestedWorkout():null;
  loadDraft();
  renderDateStrip();
  renderBanners();
  renderLogContent();
}

// ── BANNERS ──
function renderBanners(){
  const el=document.getElementById('log-banners');
  let html='';
  const recent=getSessions().slice(0,2);
  if(recent.length>=2&&recent.every(s=>s.pain>=3)){
    html+=`<div class="pain-warn-banner">⚠️ Your last 2 sessions had elevated pain. Progression paused. Consider checking with your PT.</div>`;
  }
  if(selectedWorkout&&shouldDeloadNow(selectedWorkout)){
    html+=`<div class="deload-banner"><div class="db-icon">🔄</div><div><div class="db-text">Deload Week</div><div class="db-sub">Drop to 2 sets per exercise, same weight. Recovery is part of progress.</div></div></div>`;
  } else if(selectedWorkout&&isStalled(selectedWorkout)){
    html+=`<div class="stall-banner">⚠️ Progression has stalled on multiple exercises. Consider asking your coach about an early deload.</div>`;
  }
  el.innerHTML=html;
}

// ── DRAFT ──
function loadDraft(){
  const key='session_draft_'+selectedDate+'_'+(selectedWorkout||'none');
  const saved=localStorage.getItem(key);
  state=saved?JSON.parse(saved):{pain:0,sections:{},notes:''};
  if(selectedWorkout){
    const w=program.workouts.find(w=>w.id===selectedWorkout);
    w&&w.sections.forEach(sec=>{
      if(!state.sections[sec.id])state.sections[sec.id]={};
      if(sec.type==='exercises'){
        const isDeload=shouldDeloadNow(selectedWorkout);
        const numSets=isDeload?getDeloadSets(3):3;
        sec.items.forEach(ex=>{
          if(!state.sections[sec.id][ex.id]){
            const sw=getSuggestedWeight(sec.id,ex.id,ex);
            const actualSets=isDeload?getDeloadSets(ex.sets):ex.sets;
            state.sections[sec.id][ex.id]=Array.from({length:actualSets},()=>({w:sw?String(sw):'',r:''}));
          }
        });
      }
    });
  }
}
function saveDraft(){
  if(!selectedWorkout)return;
  state.workoutId=selectedWorkout;
  const key='session_draft_'+selectedDate+'_'+selectedWorkout;
  try{localStorage.setItem(key,JSON.stringify(state));}catch(e){console.error('Draft save failed',e);}
}

// ── PROGRESSION ──
function getLastSetData(secId,exId){
  for(const s of getSessions()){
    if(s.date===selectedDate)continue;
    const sets=s.sections?.[secId]?.[exId];
    if(sets&&sets.some(r=>r.r))return {date:s.date,sets,deload:s.deload};
  }
  return null;
}
function getConsecutiveHits(secId,exId,target){
  let count=0;
  for(const s of getSessions()){
    if(s.date===selectedDate)continue;
    if(s.deload)continue; // skip deload sessions for progression
    const sets=s.sections?.[secId]?.[exId];
    if(!sets||!sets.some(r=>r.r))break;
    const allHit=sets.filter(r=>r.r).every(r=>parseInt(r.r)>=target);
    if(allHit)count++;
    else break;
  }
  return count;
}
function getSuggestedWeight(secId,exId,ex){
  if(ex.banded)return null;
  const last=getLastSetData(secId,exId);
  if(!last)return ex.startWeight?nearestWeight(ex.startWeight):null;
  const lastWs=last.sets.map(r=>parseFloat(r.w)).filter(n=>!isNaN(n)&&n>0);
  if(!lastWs.length)return ex.startWeight?nearestWeight(ex.startWeight):null;
  const lastW=Math.max(...lastWs);
  const recent=getSessions().slice(0,2);
  if(recent.length>=2&&recent.every(s=>s.pain>=3))return lastW;
  const hits=getConsecutiveHits(secId,exId,ex.target);
  if(hits>=3){
    const nw=nextWeight(lastW);
    return nw||lastW;
  }
  return lastW;
}
function getProgressionStatus(secId,exId,ex){
  if(ex.banded)return null;
  const last=getLastSetData(secId,exId);
  if(!last)return ex.startWeight?{type:'first',weight:nearestWeight(ex.startWeight),msg:`First session — start at ${nearestWeight(ex.startWeight)} lbs. Adjust after set 1.`}:null;
  const lastWs=last.sets.map(r=>parseFloat(r.w)).filter(n=>!isNaN(n)&&n>0);
  if(!lastWs.length)return null;
  const lastW=Math.max(...lastWs);
  if(shouldDeloadNow(selectedWorkout))return {type:'deload',weight:lastW,msg:`Deload — ${lastW} lbs at reduced volume`};
  const recent=getSessions().slice(0,2);
  if(recent.length>=2&&recent.every(s=>s.pain>=3))return {type:'paused',weight:lastW,msg:`Progression paused — elevated pain. Stay at ${lastW} lbs.`};
  const hits=getConsecutiveHits(secId,exId,ex.target);
  if(hits>=3){
    const nw=nextWeight(lastW);
    if(nw)return {type:'progress',weight:nw,msg:`✓ Progressing to ${nw} lbs (3 sessions hit at ${lastW})`};
    return {type:'hold',weight:lastW,msg:`Max weight available — stay at ${lastW} lbs`};
  }
  if(hits===2){
    const nw=nextWeight(lastW);
    if(nw)return {type:'almost',weight:lastW,msg:`Hit target at ${lastW} once more → next: ${nw} lbs`};
  }
  if(hits===1)return {type:'building',weight:lastW,msg:`Hit target last time — stick with ${lastW} lbs`};
  return {type:'retry',weight:lastW,msg:`Missed target last time — retry ${lastW} lbs`};
}

    const isSelected=selectedWorkout===w.id;

    const isRecommended=recommended===w.id&&!isDoneToday;
    let cls='workout-tile';
    if(isSelected)cls+=' selected';
    else if(isDoneToday)cls+=' done-today';
    else if(isRecommended)cls+=' recommended';
    html+=`<div class="${cls}" onclick="pickWorkout('${w.id}')">
      <div class="wt-emoji">${w.emoji}</div>
      <div class="wt-info">
        <div class="wt-name">${w.name}${isRecommended?' <span class="recommended-badge">Today</span>':''}</div>
        <div class="wt-desc">${w.description||''}</div>
      </div>
      ${isDoneToday&&!isSelected?'<div class="done-badge">DONE</div>':''}

  });

        if(sec.type==='checklist'){

      });

function pickWorkout(id){

// ── PAIN ──
function renderPainRow(){
  const row=document.getElementById('pain-row');if(!row)return;
  row.innerHTML='';
  [0,1,2,3,4,5].forEach(n=>{
    const btn=document.createElement('button');
    btn.className='pain-btn';btn.textContent=n===0?'—':n;
    if(state.pain===n)btn.classList.add(n===0?'ag':n<=2?'a1':n===3?'a2':'a3');
    btn.onclick=()=>{state.pain=n;saveDraft();renderPainRow();updatePainLabel();};
    row.appendChild(btn);
  });
  updatePainLabel();
}
function updatePainLabel(){
  const el=document.getElementById('pain-label');if(!el)return;
  el.textContent=state.pain>0?PAIN_LABELS[state.pain]:'';
  el.style.color=state.pain<=2?'var(--green)':state.pain===3?'var(--amber)':'var(--red)';
}

// ── MOBILITY ──
function renderMobSection(sec){
  const listEl=document.getElementById('mob-list-'+sec.id);if(!listEl)return;
  const ctrEl=document.getElementById('mob-ctr-'+sec.id);
  const items=state.sections[sec.id]||{};
  listEl.innerHTML='';let done=0;
  sec.items.forEach(item=>{
    const checked=!!items[item.id];if(checked)done++;
    const el=document.createElement('div');
    el.className='mob-item'+(checked?' done':'');
    el.innerHTML=`<div class="mob-check">${checked?'✓':''}</div><div class="mob-name">${item.name}</div><div class="mob-rx">${item.rx}</div>`;
    el.onclick=()=>{if(!state.sections[sec.id])state.sections[sec.id]={};state.sections[sec.id][item.id]=!state.sections[sec.id][item.id];saveDraft();renderMobSection(sec);};
    listEl.appendChild(el);
  });
  if(ctrEl){ctrEl.textContent=done+'/'+sec.items.length;ctrEl.className='pill'+(done===sec.items.length?' ok':'');}
}

// ── EXERCISES ──
function renderExSection(sec){
  const listEl=document.getElementById('ex-list-'+sec.id);if(!listEl)return;
  listEl.innerHTML='';
  const isDeload=shouldDeloadNow(selectedWorkout);
  sec.items.forEach(ex=>{
    const prog=getProgressionStatus(sec.id,ex.id,ex);
    const card=document.createElement('div');
    card.className='ex-card';
    const lastSet=getLastSetData(sec.id,ex.id);
    const lastW=lastSet?Math.max(...lastSet.sets.map(r=>parseFloat(r.w)).filter(n=>!isNaN(n)&&n>0)):null;
    const actualSets=isDeload?getDeloadSets(ex.sets):ex.sets;
    const rxDisplay=isDeload?`${actualSets}×${ex.target}`:ex.rx;
    
    let html=`<div class="ex-hdr">
      <div>
        <div class="ex-name">${ex.name}</div>
        ${ex.note?`<div class="ex-note">${ex.note}</div>`:''}
      </div>
      <div class="ex-meta">
        <div class="ex-rx${isDeload?' deload':''}">${rxDisplay}</div>
        ${lastW?`<div class="ex-last">last: ${lastW} lbs</div>`:''}
      </div>
    </div>`;
    
    if(prog){
      const tipClass={first:'blue',progress:'green',almost:'amber',building:'green',retry:'amber',hold:'green',paused:'red',deload:'purple'}[prog.type]||'blue';
      const icon={first:'🎯',progress:'↑',almost:'•',building:'·',retry:'↻',hold:'=',paused:'⚠',deload:'🔄'}[prog.type]||'·';
      html+=`<div class="suggest-tip ${tipClass}">${icon} ${prog.msg}</div>`;
    }
    
    if(ex.banded){
      html+='<div class="band-sets">';
      for(let i=0;i<actualSets;i++){
        const done=state.sections[sec.id]?.[ex.id]?.[i]?.r==='done';
        html+=`<button class="band-btn${done?' done':''}" onclick="toggleBand('${sec.id}','${ex.id}',${i})">${done?'✓ ':''}Set ${i+1}</button>`;
      }
      html+='</div>';
    } else {
      html+='<div class="sets-hdr"><div></div><div class="sets-col">lbs</div><div class="sets-col">reps</div></div>';
      for(let i=0;i<actualSets;i++){
        const s=state.sections[sec.id]?.[ex.id]?.[i]||{w:'',r:''};
        const hit=parseInt(s.r)>=ex.target;
        const wClass=s.w&&!s.r?'set-input suggested':'set-input';
        html+=`<div class="set-row">
          <div class="set-num${hit?' hit':''}">${hit?'✓':'S'+(i+1)}</div>
          <input class="${wClass}" type="number" inputmode="decimal" placeholder="—" value="${s.w}" onchange="updateSet('${sec.id}','${ex.id}',${i},'w',this.value)" onfocus="this.select()">
          <input class="set-input${hit?' hit':''}" type="number" inputmode="decimal" placeholder="—" value="${s.r}" onchange="updateSet('${sec.id}','${ex.id}',${i},'r',this.value)" onfocus="this.select()">
        </div>`;
      }
    }
    card.innerHTML=html;
    listEl.appendChild(card);
  });
}

function updateSet(secId,exId,idx,field,val){
  if(!state.sections[secId])state.sections[secId]={};
  if(!state.sections[secId][exId])state.sections[secId][exId]=[];
  while(state.sections[secId][exId].length<=idx)state.sections[secId][exId].push({w:'',r:''});
  state.sections[secId][exId][idx][field]=val;
  saveDraft();
  const sec=program.workouts.find(w=>w.id===selectedWorkout)?.sections.find(s=>s.id===secId);
  if(sec)renderExSection(sec);
}
function toggleBand(secId,exId,idx){
  if(!state.sections[secId])state.sections[secId]={};
  if(!state.sections[secId][exId])state.sections[secId][exId]=[];
  while(state.sections[secId][exId].length<=idx)state.sections[secId][exId].push({w:'',r:''});
  state.sections[secId][exId][idx].r=state.sections[secId][exId][idx].r==='done'?'':'done';
  saveDraft();
  const sec=program.workouts.find(w=>w.id===selectedWorkout)?.sections.find(s=>s.id===secId);
  if(sec)renderExSection(sec);
}

// ── SAVE SESSION ──
function finishSession(){
  if(!selectedWorkout){showToast('Please pick a workout first','error');return;}
  try{
    state.notes=document.getElementById('session-notes')?.value||'';
    state.date=selectedDate;
    state.workoutId=selectedWorkout;
    if(shouldDeloadNow(selectedWorkout))state.deload=true;
    const sessions=getSessions();
    const idx=sessions.findIndex(s=>s.date===selectedDate&&s.workoutId===selectedWorkout);
    if(idx>=0)sessions[idx]={...state};else sessions.unshift({...state});
    sessions.sort((a,b)=>b.date.localeCompare(a.date));
    if(!saveSessions(sessions))throw new Error('Could not write to storage');
    try{localStorage.removeItem('session_draft_'+selectedDate+'_'+selectedWorkout);}catch(e){}
    showToast('✓ Session saved');
    renderDateStrip();renderHistory();renderBanners();
    updateCoachMemory();
    addChatMessage('assistant',buildSaveMsg());
    state={pain:0,sections:{},notes:''};
    selectedWorkout=null;
    renderLogContent();
    setTimeout(()=>switchTab('history'),300);
  }catch(err){
    console.error('Save error:',err);
    showToast('Save failed: '+err.message,'error');
    alert('Save failed: '+err.message+'\n\nYour data is still on this screen. Try again.');
  }
}
function buildSaveMsg(){
  const w=program.workouts.find(w=>w.id===selectedWorkout);
  const sessions=getSessions();
  const s=sessions.find(x=>x.date===selectedDate&&x.workoutId===selectedWorkout);
  if(!s)return 'Session saved!';
  let msg=`✅ **${w?.name||'Workout'}** saved${s.deload?' (deload)':''} — ${new Date(selectedDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}\nBack pain: ${s.pain}/5${s.pain>0?' — '+PAIN_LABELS[s.pain]:''}\n`;
  if(w){
    w.sections.forEach(sec=>{
      if(sec.type==='exercises'){
        sec.items.forEach(ex=>{
          const sets=s.sections?.[sec.id]?.[ex.id]||[];
          if(!sets.some(r=>r.r))return;
          msg+=ex.banded?`${ex.name}: ${sets.filter(r=>r.r==='done').length}/${sets.length} ✓\n`:`${ex.name}: ${sets.filter(r=>r.r).map(r=>`${r.w||'?'}×${r.r}`).join(', ')}\n`;
        });
      }
    });
  }
  if(s.notes)msg+=`Notes: ${s.notes}\n`;
  msg+=`\nHow'd it feel?`;
  return msg;
}

// ── COACH MEMORY ──
async function updateCoachMemory(){
  const apiKey=localStorage.getItem('anthropic_key');if(!apiKey)return;
  const sessions=getSessions().slice(0,8);
  const sessionData=sessions.map(s=>{
    const w=program.workouts.find(w=>w.id===s.workoutId);
    let d=`${s.date} — ${w?.name||s.workoutId}${s.deload?' (DELOAD)':''} (pain ${s.pain||0}/5):\n`;
    w?.sections?.forEach(sec=>{if(sec.type==='exercises')sec.items.forEach(ex=>{const sets=s.sections?.[sec.id]?.[ex.id]||[];if(sets.some(r=>r.r))d+=`  ${ex.name}: ${sets.filter(r=>r.r).map(r=>`${r.w||'?'}×${r.r}`).join(', ')}\n`;});});
    if(s.notes)d+=`  Notes: ${s.notes}`;
    return d;
  }).join('\n\n');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,
        messages:[{role:'user',content:`Maintain a training memory for James (L5 disc bulge).\n\nCurrent memory:\n${getMemory()||'(none)'}\n\nRecent sessions:\n${sessionData}\n\nUpdate memory (max 120 words). Note progressions, pain trends, what's going well, what to watch. Third person. Return ONLY the memory text.`}]})
    });
    const d=await res.json();
    if(d.content?.[0]?.text){saveMemory(d.content[0].text);renderProgram();}
  }catch(e){}
}

function applyCommands(text){
  let changed=false,loggedSessions=0;
  [...text.matchAll(/\[\[PROGRAM:(.*?)\]\]/gs)].forEach(m=>{
    try{
      const cmd=JSON.parse(m[1]);
      const p=getProgram();
      if(cmd.action==='update_exercise'){
        const w=p.workouts.find(w=>w.id===cmd.workoutId);
        if(w){const sec=w.sections.find(s=>s.id===cmd.sectionId);if(sec){const ex=sec.items.find(e=>e.id===cmd.exerciseId);if(ex){Object.assign(ex,cmd.changes);changed=true;}}}
      } else if(cmd.action==='add_exercise'){
        const w=p.workouts.find(w=>w.id===cmd.workoutId);
        if(w){let sec=w.sections.find(s=>s.id===cmd.sectionId);if(!sec){sec={id:cmd.sectionId,name:cmd.sectionName||'Exercises',type:'exercises',items:[]};w.sections.push(sec);}if(!sec.items.find(e=>e.id===cmd.exercise.id)){sec.items.push(cmd.exercise);changed=true;}}
      } else if(cmd.action==='remove_exercise'){
        const w=p.workouts.find(w=>w.id===cmd.workoutId);
        if(w){const sec=w.sections.find(s=>s.id===cmd.sectionId);if(sec){sec.items=sec.items.filter(e=>e.id!==cmd.exerciseId);changed=true;}}
      } else if(cmd.action==='replace_workout'||cmd.action==='add_workout'){
        const idx=p.workouts.findIndex(w=>w.id===cmd.workout.id);
        if(idx>=0)p.workouts[idx]=cmd.workout;else p.workouts.push(cmd.workout);
        changed=true;
      } else if(cmd.action==='swap_exercise'){
        const w=p.workouts.find(w=>w.id===cmd.workoutId);
        if(w){const sec=w.sections.find(s=>s.id===cmd.sectionId);if(sec){const idx=sec.items.findIndex(e=>e.id===cmd.oldExerciseId);if(idx>=0){sec.items[idx]=cmd.newExercise;changed=true;}}}
      }
      if(changed){saveProgram(p);program=p;}
    }catch(e){console.warn('PROGRAM parse error',e);}
  });
  [...text.matchAll(/\[\[LOG_SESSION:(.*?)\]\]/gs)].forEach(m=>{
    try{
      const session=JSON.parse(m[1]);
      if(!session.date||!session.workoutId||!session.sections)return;
      const sessions=getSessions();
      const idx=sessions.findIndex(s=>s.date===session.date&&s.workoutId===session.workoutId);
      const fullSession={date:session.date,workoutId:session.workoutId,pain:session.pain||0,sections:session.sections,notes:session.notes||''};
      if(session.deload)fullSession.deload=true;
      if(idx>=0)sessions[idx]=fullSession;else sessions.unshift(fullSession);
      sessions.sort((a,b)=>b.date.localeCompare(a.date));
      if(saveSessions(sessions))loggedSessions++;
    }catch(e){console.warn('LOG_SESSION parse error',e);}
  });
  [...text.matchAll(/\[\[MEMORY:(.*?)\]\]/gs)].forEach(m=>{
    try{const cmd=JSON.parse(m[1]);if(cmd.set)saveMemory(cmd.set);else if(cmd.append){const c=getMemory();saveMemory(c?c+' '+cmd.append:cmd.append);}}catch(e){}
  });
  if(changed){renderLogContent();renderProgram();showToast('✓ Program updated');}
  if(loggedSessions>0){renderDateStrip();renderHistory();renderLogContent();renderProgram();showToast(`✓ ${loggedSessions} session${loggedSessions>1?'s':''} logged`);}
  return text.replace(/\[\[PROGRAM:.*?\]\]/gs,'').replace(/\[\[LOG_SESSION:.*?\]\]/gs,'').replace(/\[\[MEMORY:.*?\]\]/gs,'').trim();
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();if(!text)return;
  const apiKey=localStorage.getItem('anthropic_key');if(!apiKey){showApiModal();return;}
  input.value='';input.style.height='auto';
  addChatMessage('user',text);
  chatHistory.push({role:'user',content:text});
  document.getElementById('chat-send').disabled=true;
  showTyping();

  const sessions=getSessions().slice(0,10);
  const sessionCtx=sessions.length?'\n\nRecent sessions:\n'+sessions.map(s=>{
    const w=program.workouts.find(w=>w.id===s.workoutId);
    let d=`${s.date} — ${w?.name||s.workoutId}${s.deload?' (DELOAD)':''} (pain ${s.pain||0}/5):`;
    w?.sections?.forEach(sec=>{if(sec.type==='exercises')sec.items.forEach(ex=>{const sets=s.sections?.[sec.id]?.[ex.id]||[];if(sets.some(r=>r.r))d+=`\n  ${ex.name}: ${sets.filter(r=>r.r).map(r=>`${r.w||'?'}×${r.r}`).join(', ')}`;});});
    if(s.notes)d+=`\n  Notes: ${s.notes}`;
    return d;
  }).join('\n\n'):'';
  const progInfo=JSON.stringify(program.workouts.map(w=>({id:w.id,name:w.name,sections:w.sections?.map(s=>({id:s.id,type:s.type,items:s.items?.map(i=>({id:i.id,name:i.name,rx:i.rx,sets:i.sets,target:i.target,banded:i.banded||false,startWeight:i.startWeight}))}))})));
  const upperSinceDeload=getSessionsSinceLastDeload('upper');
  const lowerSinceDeload=getSessionsSinceLastDeload('lower');
  const fullSinceDeload=getSessionsSinceLastDeload('full');
  const todaySuggestion=getSuggestedWorkout();

  const sys=`You are James's personal trainer and rehab coach inside his workout tracking app.
Background:
- L5 disc bulge, facet joints, sciatica; returning from 1 year off lifting
- PT program designed by Kristen Lettenberger DPT
- Equipment: adjustable DBs (5lb handle + 3/5/7.5lb plates, full set), bands, bench, slant board, foam roller, grip trainer
- Available weights: ${WEIGHTS.slice(0,15).join(', ')}, ...
- Schedule pattern: Mon=Upper, Wed=Lower, Fri=Full (Tue/Thu/Sat=Mobility, Sun=Rest). Flexible if days missed.
- App auto-suggests today's workout but user can pick anything.
- Progression: 5lb increments via double progression
- Deload triggered every 12 sessions per workout type (currently: Upper ${upperSinceDeload}/12, Lower ${lowerSinceDeload}/12, Full ${fullSinceDeload}/12)
- Deload = 2 sets same weight (volume drop, intensity maintained)

Today's date: ${TODAY}
Today's recommended workout: ${todaySuggestion}
Current program:
${progInfo}
Coach memory:
${getMemory()||'(none yet)'}${sessionCtx}

═══ COMMANDS (embed inline to make changes) ═══

LOG SESSION (when user describes a workout):
[[LOG_SESSION:{"date":"${TODAY}","workoutId":"upper","pain":2,"sections":{"upper_body":{"floor_press":[{"w":"20","r":"10"},{"w":"20","r":"10"},{"w":"20","r":"9"}]}},"notes":"felt good"}]]

SWAP EXERCISE (replace one with another):
[[PROGRAM:{"action":"swap_exercise","workoutId":"upper","sectionId":"upper_body","oldExerciseId":"floor_fly","newExercise":{"id":"db_pullover","name":"DB Pullover","rx":"3×10","sets":3,"target":10,"startWeight":15,"note":"On bench, controlled"}}]]

UPDATE EXERCISE:
[[PROGRAM:{"action":"update_exercise","workoutId":"upper","sectionId":"upper_body","exerciseId":"floor_press","changes":{"sets":4,"target":12,"rx":"4×12"}}]]

ADD EXERCISE:
[[PROGRAM:{"action":"add_exercise","workoutId":"upper","sectionId":"upper_body","exercise":{"id":"new_id","name":"Name","rx":"3×10","sets":3,"target":10,"startWeight":15,"note":"cue"}}]]

REMOVE EXERCISE:
[[PROGRAM:{"action":"remove_exercise","workoutId":"upper","sectionId":"upper_body","exerciseId":"id"}]]

UPDATE MEMORY:
[[MEMORY:{"set":"new notes"}]]

═══ RULES ═══
- When user describes a workout done, ALWAYS log via LOG_SESSION. Match exercise names to IDs. Confirm what you logged.
- When user asks to swap/add/remove an exercise, ALWAYS include the PROGRAM command — changes persist permanently.
- For "what should I do today?", reference the schedule and what's been done this week. Recommended today: ${todaySuggestion}.
- Be conservative with L5 — avoid heavy axial loading
- Keep responses warm and concise`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:sys,messages:chatHistory})
    });
    const data=await res.json();
    hideTyping();
    if(data.content?.[0]?.text){
      const raw=data.content[0].text;
      chatHistory.push({role:'assistant',content:raw});
      const clean=applyCommands(raw);
      addChatMessage('assistant',clean||'Done!');
    } else {
      addChatMessage('assistant',data.error?.message||'Something went wrong. Check your API key.');
    }
  }catch(e){hideTyping();addChatMessage('assistant','Connection error — check internet and try again.');}
  document.getElementById('chat-send').disabled=false;
}
function chatKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// ── UTILITIES ──
function showToast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show'+(type==='error'?' error':'');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function updateApiStatus(){
  const el=document.getElementById('api-btn'),k=localStorage.getItem('anthropic_key');
  el.textContent=k?'Coach ●':'Coach ○';
  k?el.classList.add('ok'):el.classList.remove('ok');
}
function showApiModal(){document.getElementById('api-modal-input').value=localStorage.getItem('anthropic_key')||'';document.getElementById('api-modal').style.display='flex';}
function closeApiModal(){document.getElementById('api-modal').style.display='none';}
function saveApiKeyModal(){const k=document.getElementById('api-modal-input').value.trim();if(k){localStorage.setItem('anthropic_key',k);updateApiStatus();}closeApiModal();}
</script>
